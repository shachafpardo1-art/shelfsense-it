apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shelfsense.backend.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shelfsense.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgresql+psycopg://%s:%s@%s:%v/%s" .Values.database.username (required "database.auth.password is required; supply it with --set-string database.auth.password=... or values.local.yaml" .Values.database.auth.password) .Values.database.service.name .Values.database.service.port .Values.database.name | quote }}