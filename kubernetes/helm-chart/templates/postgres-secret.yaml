apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shelfsense.postgres.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shelfsense.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "database.auth.password is required; supply it with --set-string database.auth.password=... or values.local.yaml" .Values.database.auth.password | quote }}
